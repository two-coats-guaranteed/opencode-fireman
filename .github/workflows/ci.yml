name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dev deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Fireman-Bench (gates G5 and G6)
        run: bun run bench

      - name: Build dist/
        run: bun run build

      - name: Verify dist/ shape
        run: |
          set -euo pipefail
          for f in dist/index.js dist/index.d.ts dist/detector.js dist/detector.d.ts dist/types.js dist/types.d.ts; do
            test -f "$f" || (echo "missing $f" && exit 1)
          done
          echo "dist/ shape OK"
          ls -la dist/

      - name: Smoke-test the built detector
        run: bun run smoke

      - name: Consumer-install test (verifies the published tarball is importable)
        run: bun run consumer-test

      - name: Show pack contents
        run: |
          set -euo pipefail
          ls -la opencode-fireman-*.tgz
          echo "--- pack contents ---"
          tar -tzf opencode-fireman-*.tgz | sort
          echo "--- pack size ---"
          du -h opencode-fireman-*.tgz
